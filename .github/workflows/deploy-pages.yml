name: Deploy ComplyPS site to GitHub Pages

# Builds the public site and publishes it to GitHub Pages on every push to main.
# Layout published:
#   /                -> ComplyPS landing page (website/index.html)
#   /complyps-cra/   -> the CRA tool (built React app from frontend/)
# The backend is private and runs separately on the laptop — it is NOT here.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Assemble site (landing at root, tool under /complyps-cra/)
        run: |
          rm -rf _site
          mkdir -p _site/complyps-cra
          cp -r website/* _site/
          cp -r frontend/dist/* _site/complyps-cra/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
